<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        h3 {
            font-size: 20px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .subtitle {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999999);
            margin-bottom: 24px;
        }
        .field-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--tg-theme-hint-color, #999999);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input {
            display: block;
            width: 100%;
            padding: 14px 16px;
            font-size: 17px;
            border: 1.5px solid var(--tg-theme-hint-color, #cccccc);
            border-radius: 12px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000000);
            -webkit-appearance: none;
            appearance: none;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #2AABEE;
            box-shadow: 0 0 0 3px rgba(42,171,238,0.15);
        }
        .preview {
            margin-top: 24px;
            padding: 14px 16px;
            background: var(--tg-theme-secondary-bg-color, #f0f7ff);
            border-radius: 12px;
            font-size: 16px;
            text-align: center;
            font-weight: 500;
            color: var(--tg-theme-text-color, #000000);
        }
        .preview span {
            color: #2AABEE;
        }
    </style>
</head>
<body>
    <h3>📅 Дата и время покупки</h3>
    <p class="subtitle">Выберите дату в календаре и укажите точное время</p>

    <div class="field-group">
        <label>Дата</label>
        <input type="date" id="date">
    </div>

    <div class="field-group">
        <label>Время</label>
        <input type="time" id="time">
    </div>

    <div class="preview" id="preview">
        Выберите дату и время
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.MainButton.setText('✅ Подтвердить').show();
        tg.MainButton.color = '#2AABEE';
        tg.expand();

        const dateInput = document.getElementById('date');
        const timeInput = document.getElementById('time');
        const preview = document.getElementById('preview');

        // Установить сегодняшнюю дату по умолчанию
        const now = new Date();
        dateInput.value = now.toISOString().split('T')[0];
        
        // Округлить время до ближайших 5 минут
        const minutes = Math.round(now.getMinutes() / 5) * 5;
        const roundedTime = new Date(now);
        roundedTime.setMinutes(minutes, 0, 0);
        timeInput.value = String(roundedTime.getHours()).padStart(2,'0') + ':' 
                        + String(roundedTime.getMinutes()).padStart(2,'0');

        // Максимальная дата — сегодня, минимальная — 3 года назад
        dateInput.max = now.toISOString().split('T')[0];
        const threeYearsAgo = new Date(now);
        threeYearsAgo.setFullYear(now.getFullYear() - 3);
        dateInput.min = threeYearsAgo.toISOString().split('T')[0];

        // Форматирование для предпросмотра
        function formatDate(dateStr) {
            if (!dateStr) return '——';
            const parts = dateStr.split('-');
            return parts[2] + '.' + parts[1] + '.' + parts[0];
        }

        function updatePreview() {
            const d = dateInput.value;
            const t = timeInput.value;
            if (d && t) {
                preview.innerHTML = '📅 <span>' + formatDate(d) + '</span> в <span>' + t + '</span>';
            } else if (d) {
                preview.innerHTML = '📅 <span>' + formatDate(d) + '</span>, время не выбрано';
            } else {
                preview.innerHTML = 'Выберите дату и время';
            }
        }

        dateInput.addEventListener('input', updatePreview);
        timeInput.addEventListener('input', updatePreview);

        // Начальный предпросмотр
        updatePreview();

        // Кнопка подтверждения
        tg.MainButton.onClick(function() {
            const dateVal = dateInput.value;
            const timeVal = timeInput.value;
            
            if (!dateVal || !timeVal) {
                tg.showAlert('Пожалуйста, выберите и дату, и время');
                return;
            }
            
            tg.sendData(JSON.stringify({
                action: 'datetime',
                date: dateVal,
                time: timeVal
            }));
            tg.close();
        });
    </script>
</body>
</html>
