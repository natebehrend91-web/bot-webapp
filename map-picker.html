<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #map { width: 100%; height: calc(100% - 60px); }
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 60px;
            background: #ffffff; display: flex; align-items: center; justify-content: center;
            border-top: 1px solid #cccccc; z-index: 1000; gap: 10px; padding: 8px;
        }
        .btn-confirm {
            flex: 1; height: 44px; background: #2AABEE; color: white;
            border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
            cursor: pointer; max-width: 300px;
        }
        .btn-confirm:active { background: #1D8EC9; }
        .coords-label {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 6px 14px;
            border-radius: 20px; font-size: 13px; z-index: 999; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="coords-label" id="coords">📍 Передвиньте карту</div>
    <div class="bottom-bar">
        <button class="btn-confirm" id="btnConfirm">✅ Подтвердить</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const defaultLat = 58.0105;
        const defaultLon = 56.2502;
        const defaultZoom = 13;

        const map = L.map('map', { zoomControl: true }).setView([defaultLat, defaultLon], defaultZoom);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '',
            maxZoom: 19
        }).addTo(map);

        const marker = L.marker([defaultLat, defaultLon], { draggable: true }).addTo(map);

        const crossIcon = L.divIcon({
            className: 'cross-icon',
            html: '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:24px;height:24px;">'
                + '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#2AABEE" stroke-width="2.5">'
                + '<circle cx="12" cy="12" r="9" fill="rgba(42,171,238,0.15)"/>'
                + '<line x1="12" y1="3" x2="12" y2="21"/><line x1="3" y1="12" x2="21" y2="12"/>'
                + '</svg></div>',
            iconSize: [24, 24],
            iconAnchor: [12, 12]
        });
        
        const centerMarker = L.marker([defaultLat, defaultLon], { icon: crossIcon, interactive: false }).addTo(map);

        function updatePosition() {
            const center = map.getCenter();
            marker.setLatLng(center);
            centerMarker.setLatLng(center);
            document.getElementById('coords').textContent = '📍 ' + center.lat.toFixed(6) + ', ' + center.lng.toFixed(6);
        }

        map.on('move', updatePosition);
        map.on('click', function(e) {
            marker.setLatLng(e.latlng);
            centerMarker.setLatLng(e.latlng);
            map.panTo(e.latlng);
        });

        document.getElementById('btnConfirm').addEventListener('click', function() {
            const pos = marker.getLatLng();
            const data = JSON.stringify({ action: 'map', lat: pos.lat, lon: pos.lng });
            
            document.getElementById('btnConfirm').textContent = '⏳ Отправка...';
            document.getElementById('btnConfirm').disabled = true;
            
            tg.sendData(data);
            
            setTimeout(function() {
                tg.close();
            }, 300);
        });

        updatePosition();
    </script>
</body>
</html>
