<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #map { width: 100%; height: calc(100% - 80px); }
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #ffffff; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border-top: 1px solid #cccccc; z-index: 1000;
            padding: 8px 8px 12px 8px; gap: 8px;
        }
        .btn-confirm {
            width: 100%; max-width: 300px; height: 44px;
            background: #2AABEE; color: white;
            border: none; border-radius: 10px;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .btn-confirm:active { background: #1D8EC9; }
        .coord-text {
            font-size: 14px; color: #333; text-align: center;
            background: #f0f0f0; padding: 8px 12px; border-radius: 8px;
            width: 100%; max-width: 300px;
        }
        .copied-text {
            display: none; font-size: 13px; color: #00B894; text-align: center;
            font-weight: 600; margin-top: 2px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="bottom-bar">
        <div class="coord-text" id="coordText">58.010500, 56.250200</div>
        <button class="btn-confirm" id="btnConfirm">📋 Скопировать координаты</button>
        <div class="copied-text" id="copiedText">✅ Скопировано! Вставьте в чат (Ctrl+V)</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const defaultLat = 58.0105;
        const defaultLon = 56.2502;
        const defaultZoom = 13;

        const map = L.map('map', { zoomControl: true }).setView([defaultLat, defaultLon], defaultZoom);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '',
            maxZoom: 19
        }).addTo(map);

        const marker = L.marker([defaultLat, defaultLon], { draggable: true }).addTo(map);

        function updateCoords() {
            const pos = marker.getLatLng();
            const text = pos.lat.toFixed(6) + ', ' + pos.lng.toFixed(6);
            document.getElementById('coordText').textContent = text;
        }

        map.on('move', function() {
            const center = map.getCenter();
            marker.setLatLng(center);
            updateCoords();
        });

        map.on('click', function(e) {
            marker.setLatLng(e.latlng);
            map.panTo(e.latlng);
            updateCoords();
        });

        document.getElementById('btnConfirm').addEventListener('click', function() {
            const coordText = document.getElementById('coordText').textContent;
            
            // Копируем в буфер обмена
            navigator.clipboard.writeText(coordText).then(function() {
                // Показываем подтверждение
                document.getElementById('btnConfirm').style.display = 'none';
                document.getElementById('copiedText').style.display = 'block';
                
                // Закрываем Mini App через 1 секунду
                setTimeout(function() {
                    tg.close();
                }, 1000);
            }).catch(function() {
                // Запасной вариант — выделяем текст для ручного копирования
                const range = document.createRange();
                range.selectNode(document.getElementById('coordText'));
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);
                
                document.getElementById('btnConfirm').textContent = '⚠️ Нажмите "Копировать"';
                document.getElementById('btnConfirm').style.background = '#E17055';
            });
        });

        updateCoords();
    </script>
</body>
</html>
